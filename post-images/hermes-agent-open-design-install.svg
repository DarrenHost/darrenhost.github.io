<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4d03f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.3"/>
  <circle cx="1100" cy="530" r="120" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.2"/>
  
  <!-- Hermes logo representation (winged staff simplified) -->
  <g transform="translate(150, 200)">
    <line x1="60" y1="0" x2="60" y2="180" stroke="url(#gold)" stroke-width="4"/>
    <circle cx="60" cy="20" r="15" fill="url(#gold)"/>
    <ellipse cx="30" cy="60" rx="25" ry="15" fill="none" stroke="url(#gold)" stroke-width="3" transform="rotate(-30 30 60)"/>
    <ellipse cx="90" cy="60" rx="25" ry="15" fill="none" stroke="url(#gold)" stroke-width="3" transform="rotate(30 90 60)"/>
    <circle cx="15" cy="75" r="8" fill="url(#gold)"/>
    <circle cx="105" cy="75" r="8" fill="url(#gold)"/>
  </g>
  
  <!-- Open Design representation (layers/design) -->
  <g transform="translate(850, 200)">
    <rect x="0" y="0" width="120" height="90" rx="8" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <rect x="20" y="20" width="120" height="90" rx="8" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.7"/>
    <rect x="40" y="40" width="120" height="90" rx="8" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.5"/>
    <circle cx="100" cy="135" r="20" fill="url(#gold)" opacity="0.8"/>
    <path d="M 90 135 L 100 145 L 115 125" stroke="#0a0a0a" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Connection line -->
  <path d="M 350 290 Q 600 150 850 290" stroke="url(#gold)" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.6"/>
  
  <!-- Main Title -->
  <text x="600" y="420" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#d4af37">
    Hermes Agent + Open Design
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="480" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" fill="#ffffff" opacity="0.9">
    安装使用说明
  </text>
  
  <!-- Decorative line -->
  <line x1="400" y1="510" x2="800" y2="510" stroke="url(#gold)" stroke-width="2"/>
  
  <!-- Tags -->
  <g transform="translate(600, 550)" text-anchor="middle">
    <text font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="16" fill="#888888">AI Agent · Design System · Automation</text>
  </g>
  
  <!-- Corner accent -->
  <path d="M 0 630 L 150 630 L 0 480 Z" fill="url(#gold)" opacity="0.1"/>
</svg>
